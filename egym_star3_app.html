function allItems(){return GROUPS.flatMap(g=>g.sections.flatMap(s=>s.items));}
function doneCount(){return allItems().filter(it=>ST.cl[it.id]).length;}
function totalCount(){return allItems().length;}
function clPct(){return Math.round(doneCount()/totalCount()*100);}
function clComplete(){return clPct()===100;}
function groupDone(g){return g.sections.flatMap(s=>s.items).filter(it=>ST.cl[it.id]).length;}
function groupTotal(g){return g.sections.flatMap(s=>s.items).length;}
function groupPct(g){return Math.round(groupDone(g)/groupTotal(g)*100);}

function secPct(s){return Math.round(secDone(s)/s.items.length*100);}
function certifiedCount(){return ST.certified.length;}
function donePh(pk){return ST[pk].phases.filter(p=>p.done).length;}
function totalSess(pk){return ST[pk].phases.reduce((a,ph)=>a+ph.sessions.filter(Boolean).length,0);}
function candClPct(c){const done=S2_ITEMS.filter(it=>c.cl[it.id]).length;return Math.round(done/S2_ITEMS.length*100);}

function diffBadge(pre,post,goodUp){
  if(!pre||!post)return '';
  const d=parseFloat(post)-parseFloat(pre);if(isNaN(d))return '';
  const sign=d>0?'+':'';const good=goodUp?(d>0):(d<0);
  const cls=d===0?'diff-zero':good?'diff-good':'diff-bad';
  return '<span class="diff-badge '+cls+'">'+sign+d.toFixed(1)+'</span>';
}

    '<div class="g2"><div class="met"><div class="mv" style="color:var(--purple)">'+dp+'<span style="font-size:13px;color:var(--text3)">/4</span></div><div class="ml">フェーズ完了</div><div class="pb"><div class="pf pfp" style="width:'+(dp/4*100)+'%"></div></div></div>'+
    '<div class="met"><div class="mv" style="color:var(--green)">'+ts+'<span style="font-size:13px;color:var(--text3)">/24</span></div><div class="ml">セッション記録</div><div class="pb"><div class="pf pfg" style="width:'+(ts/24*100)+'%"></div></div></div></div></div>';
  prog.phases.forEach((ph,pi)=>{
    const sc=ph.sessions.filter(Boolean).length;
    html+='<div class="ph-block '+(ph.done?'ph-done':sc>0?'ph-active':'')+'">'+
      '<div class="ph-head" onclick="schTogglePhase('+pi+')">'+
      '<div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0"><i class="ti '+(ph.open?'ti-chevron-down':'ti-chevron-right')+'" style="font-size:17px;color:var(--text3);flex-shrink:0"></i><span style="font-size:14px;font-weight:700">'+ph.label+'</span>'+
      (ph.method?'<span class="tag tb" style="flex-shrink:0">'+ph.method+'</span>':'<span class="tag tg" style="flex-shrink:0">負荷未設定</span>')+
      '</div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px"><span style="font-size:12px;color:var(--text3)">'+sc+'/6</span><span class="tag '+(ph.done?'td':sc>0?'tb':'tg')+'">'+(ph.done?'完了':sc>0?'進行中':'未開始')+'</span></div></div>';

        '<div class="frow"><label class="flabel">フェーズメモ</label><textarea placeholder="メモを入力..." oninput="schSetNote('+pi+',this.value)">'+( ph.note||'')+'</textarea></div>'+
        '<div class="frow"><label class="flabel">ワークアウトセッション（6回）— タップして日付選択</label><div class="sess-grid">'+
        ph.sessions.map((d,si)=>'<div class="sess-slot '+(d?'has-d':'')+'" onclick="openCal('+pi+','+si+')"><div class="sess-n">第'+(si+1)+'回</div>'+(d?'<div class="sess-d">'+fmtD(d)+'</div>':'<i class="ti ti-calendar-plus" style="font-size:22px;color:var(--text3)"></i>')+'</div>').join('')+
        '</div></div>'+(ST.cal.show&&ST.cal.pi===pi&&ST.cal.prog===pk?buildCal(pi):'')+

    }
    html+='</div>';
  });
  return html;
}

function buildCal(pi){
  const {year,month,si,prog:cp}=ST.cal;const ph=ST[cp].phases[pi];
  const allKeys=ph.sessions.filter(Boolean).map(d=>d.y+'-'+d.m+'-'+d.d);
  const first=new Date(year,month,1).getDay();const offset=(first+6)%7;
  const dim=new Date(year,month+1,0).getDate();const now=new Date();
  let html='<div class="cal-wrap"><div class="cal-hd"><button class="cal-nb" onclick="calMv(-1)">‹</button><div style="text-align:center"><div style="font-size:14px;font-weight:700">'+year+'年 '+MN[month]+'</div><div style="font-size:12px;color:var(--purple);font-weight:700;margin-top:2px">第'+(si+1)+'回を選択中</div></div><button class="cal-nb" onclick="calMv(1)">›</button></div><div class="cal-grid">'+DOW.map(d=>'<div class="cal-dow">'+d+'</div>').join('')+Array(offset).fill('<div class="cal-day empty"></div>').join('');
  for(let i=1;i<=dim;i++){const key=year+'-'+(month+1)+'-'+i;const cur=ph.sessions[si];const isSel=cur&&cur.y===year&&cur.m===month+1&&cur.d===i;const isOther=!isSel&&allKeys.includes(key);const isToday=now.getFullYear()===year&&now.getMonth()===month&&now.getDate()===i;html+='<div class="cal-day '+(isSel?'sel-d':isOther?'other-d':isToday?'today-d':'')+'" onclick="pickDate('+year+','+(month+1)+','+i+')">'+i+'</div>';}
  html+='</div><div style="margin-top:10px;display:flex;gap:12px"><div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3)"><div style="width:12px;height:12px;border-radius:3px;background:var(--purple)"></div>選択中</div><div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3)"><div style="width:12px;height:12px;border-radius:3px;background:var(--green-l);border:1px solid var(--green-m)"></div>他セッション</div></div><button class="btn btnfull" style="margin-top:12px;padding:12px" onclick="closeCal()">閉じる</button></div>';
  return html;
}

function schSetProg(v){ST[ST.schProg].selected=v;}
function schSetMethod(pi,v){ST[ST.schProg].phases[pi].method=v;}
function schSetNote(pi,v){ST[ST.schProg].phases[pi].note=v;}
function openCal(pi,si){const pk=ST.schProg;if(ST.cal.show&&ST.cal.pi===pi&&ST.cal.si===si&&ST.cal.prog===pk){ST.cal.show=false;}else{ST.cal.show=true;ST.cal.prog=pk;ST.cal.pi=pi;ST.cal.si=si;}render();}
function closeCal(){ST.cal.show=false;render();}
function calMv(d){ST.cal.month+=d;if(ST.cal.month<0){ST.cal.month=11;ST.cal.year--;}if(ST.cal.month>11){ST.cal.month=0;ST.cal.year++;}render();}
function pickDate(y,m,d){const {pi,si,prog:pk}=ST.cal;ST[pk].phases[pi].sessions[si]={y,m,d};const next=si<5?si+1:null;if(next!==null){ST.cal.si=next;}else{ST.cal.show=false;}render();}
function schTogglePhase(pi){const pk=ST.schProg;ST[pk].phases.forEach((ph,i)=>{ph.open=(i===pi)?!ph.open:false;});ST.cal.show=false;render();}
function schClearPhase(pi){const ph=ST[ST.schProg].phases[pi];ph.method='';ph.note='';ph.sessions=Array(6).fill(null);ph.done=false;ST.cal.show=false;render();}
function schMarkDone(pi){if(ST[ST.schProg].phases[pi].sessions.filter(Boolean).length<6){alert('6回のセッション日をすべて設定してから完了にしてください');return;}ST[ST.schProg].phases[pi].done=true;ST[ST.schProg].phases[pi].open=false;const next=ST[ST.schProg].phases[pi+1];if(next){next.open=true;}ST.cal.show=false;render();}

/* ══════ NOTES (メモ) ══════ */
const STAR_KEY = 'star3';
function notesStorageKey(){return 'egym_notes_'+STAR_KEY;}
function loadNotes(){
  try{
    const raw=localStorage.getItem(notesStorageKey());
    return raw?JSON.parse(raw):[];
  }catch(e){return [];}
}
function saveNotes(notes){
  try{localStorage.setItem(notesStorageKey(),JSON.stringify(notes));}catch(e){}
}
function rNotes(){
  const notes=loadNotes();
  let html='<div class="card">';
  html+='<div class="ctitle">メモ <span style="font-size:11px;color:var(--text3);font-weight:400">'+notes.length+'件</span></div>';
  html+='<textarea id="new-note-input" placeholder="メモを入力（トレーニング内容、気づき、申請の経緯など）" style="width:100%;min-height:80px;padding:11px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:inherit;resize:vertical;margin-bottom:10px"></textarea>';
  html+='<button class="btn btnpur btnfull" style="padding:11px" onclick="addNote()"><i class="ti ti-plus"></i> メモを追加</button>';
  html+='</div>';

  if(notes.length>0){
    html+='<div class="card">';
    notes.slice().reverse().forEach(function(n){
      html+='<div style="padding:12px 0;border-bottom:1px solid var(--bg2)">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px">'
        +'<span style="font-size:11px;color:var(--text3);font-weight:700">'+n.date+'</span>'
        +'<button class="btn btnsm" style="padding:3px 8px" onclick="deleteNote(\''+n.id+'\')"><i class="ti ti-trash" style="font-size:11px"></i></button>'
        +'</div>'
        +'<div style="font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap">'+escNoteHtml(n.text)+'</div>'
        +'</div>';
    });
    html+='</div>';
  } else {
    html+='<div class="card" style="text-align:center;padding:24px 16px;color:var(--text3);font-size:13px">まだメモがありません</div>';
  }
  return html;
}
function escNoteHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function addNote(){
  const input=document.getElementById('new-note-input');
  const text=input.value.trim();
  if(!text)return;
  const notes=loadNotes();
  const now=new Date();
  const dateStr=now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  notes.push({id:'n'+Date.now(),text:text,date:dateStr});
  saveNotes(notes);
  render();
}
function deleteNote(id){
  if(!confirm('このメモを削除しますか？'))return;
  const notes=loadNotes().filter(function(n){return n.id!==id;});
  saveNotes(notes);
  render();
}

function toggleCP(cid,p){const c=ST.candidates.find(x=>x.id===cid);if(!c)return;if(p==='p1')c.p1Done=!c.p1Done;else c.p2Done=!c.p2Done;render();}
function addS1(cid){const c=ST.candidates.find(x=>x.id===cid);if(c&&c.star1Count<5)c.star1Count++;render();}
function subS1(cid){const c=ST.candidates.find(x=>x.id===cid);if(c&&c.star1Count>0)c.star1Count--;render();}
function toggleCT(cid){const c=ST.candidates.find(x=>x.id===cid);if(!c)return;if(!c.testDone){c.testDone=true;c.testPass=true;}else if(c.testPass){c.testPass=false;}else{c.testDone=false;}render();}
function simCl(cid){const c=ST.candidates.find(x=>x.id===cid);if(!c)return;const nd=S2_ITEMS.filter(it=>!c.cl[it.id]);nd.slice(0,Math.max(1,Math.ceil(nd.length/3))).forEach(it=>{c.cl[it.id]=true;});render();}
function certifyS2(cid){const c=ST.candidates.find(x=>x.id===cid);if(!c)return;c.status='certified';c.certifiedAt=new Date().toLocaleDateString('ja-JP');if(!ST.certified.find(x=>x.id===cid))ST.certified.push(c);ST.modal=null;toast(c.name+'さんをスター2として認定しました');render();}

/* MODAL */
function rModal(){
  if(ST.modal==='invite'){
    return '<div class="modal-bg" onclick="if(event.target===this){ST.modal=null;render()}"><div class="modal"><div class="modal-handle"></div>'+
      '<div style="font-size:17px;font-weight:700;margin-bottom:4px">スター2候補者を招待</div>'+
      '<div style="font-size:12px;color:var(--text3);margin-bottom:16px">メールアドレスを入力するとスター2アプリへのアクセスが付与されます</div>'+
      '<div class="frow"><label class="flabel">氏名</label><input type="text" id="inv-name" placeholder="例: 田中 直子"></div>'+
      '<div class="frow"><label class="flabel">メールアドレス</label><input type="email" id="inv-email" placeholder="example@egym.jp"></div>'+
      '<div style="padding:12px;background:var(--purple-l);border-radius:var(--r-sm);font-size:12px;color:var(--purple);margin-bottom:18px;line-height:1.6"><i class="ti ti-info-circle"></i> 招待後、候補者のチェックリスト・プログラム①②・スター1育成・テストの進捗をこの画面で確認できます。</div>'+
      '<div style="display:flex;gap:10px"><button class="btn" style="flex:1" onclick="ST.modal=null;render()">キャンセル</button><button class="btn btnpur" style="flex:1" onclick="doInvite()"><i class="ti ti-send"></i> 招待する</button></div>'+
      '</div></div>';
  }
  if(ST.modal&&ST.modal.startsWith('certify|')){
    const cid=ST.modal.split('|')[1];const c=ST.candidates.find(x=>x.id===cid);if(!c)return'';
    return '<div class="modal-bg" onclick="if(event.target===this){ST.modal=null;render()}"><div class="modal"><div class="modal-handle"></div>'+
      '<div style="font-size:17px;font-weight:700;margin-bottom:4px">スター2を認定する</div>'+
      '<div style="font-size:12px;color:var(--text3);margin-bottom:14px">この認定はJHTJapanへ通知されます</div>'+
      '<div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg);border-radius:var(--r-sm);margin-bottom:14px"><div class="av-sm" style="width:44px;height:44px;background:var(--blue-l);color:var(--blue);border-color:var(--blue-m)">'+c.initials+'</div><div><div style="font-size:15px;font-weight:700">'+c.name+'</div><div style="font-size:12px;color:var(--text3)">'+c.email+'</div></div></div>'+
      '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">'+
      '<div style="display:flex;justify-content:space-between;padding:10px 12px;background:'+(candClPct(c)===100?'var(--green-l)':'var(--red-l)')+';border-radius:var(--r-sm)"><span style="font-size:13px;font-weight:700">チェックリスト</span><span class="tag '+(candClPct(c)===100?'td':'tf')+'">'+candClPct(c)+'%</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding:10px 12px;background:'+(c.p1Done&&c.p2Done?'var(--green-l)':'var(--red-l)')+';border-radius:var(--r-sm)"><span style="font-size:13px;font-weight:700">プログラム①②</span><span class="tag '+(c.p1Done&&c.p2Done?'td':'tf')+'">'+(c.p1Done&&c.p2Done?'完了':'未完了')+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding:10px 12px;background:'+(c.star1Count>=2?'var(--green-l)':'var(--red-l)')+';border-radius:var(--r-sm)"><span style="font-size:13px;font-weight:700">スター1育成</span><span class="tag '+(c.star1Count>=2?'td':'tf')+'">'+c.star1Count+'/2名</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding:10px 12px;background:'+(c.testPass?'var(--green-l)':'var(--red-l)')+';border-radius:var(--r-sm)"><span style="font-size:13px;font-weight:700">確認テスト</span><span class="tag '+(c.testPass?'td':'tf')+'">'+(c.testPass?'合格':'未合格')+'</span></div>'+
      '</div>'+
      '<div style="padding:12px;background:var(--amber-l);border-radius:var(--r-sm);font-size:12px;color:var(--amber);margin-bottom:18px"><i class="ti ti-alert-triangle"></i> 認定後は取り消せません。全条件を確認してから認定してください。</div>'+
      '<div style="display:flex;gap:10px"><button class="btn" style="flex:1" onclick="ST.modal=null;render()">キャンセル</button><button class="btn btng" style="flex:1" onclick="certifyS2(\''+c.id+'\')"><i class="ti ti-award"></i> 認定する</button></div>'+
      '</div></div>';
  }
  if(ST.modal==='certjht'){
    return '<div class="modal-bg" onclick="if(event.target===this){ST.modal=null;render()}"><div class="modal"><div class="modal-handle"></div>'+
      '<div style="font-size:17px;font-weight:700;margin-bottom:4px">JHTJapanへ申請</div>'+
      '<div style="font-size:12px;color:var(--text3);margin-bottom:16px">スター3認定申請をJHTJapanへ送ります</div>'+
      '<div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg);border-radius:var(--r-sm);margin-bottom:16px"><div style="width:44px;height:44px;border-radius:50%;background:var(--purple-l);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid var(--purple-m)">JHT</div><div><div style="font-size:14px;font-weight:700">JHTJapan</div><div style="font-size:12px;color:var(--text3)">スーパーアカウント · 最終認定機関</div></div></div>'+
      '<div style="padding:12px;background:var(--purple-l);border-radius:var(--r-sm);font-size:12px;color:var(--purple);margin-bottom:18px;line-height:1.6"><i class="ti ti-info-circle"></i> 申請後、JHTJapanが全内容を確認して最終認定します。認定後にバッジ・ノベルティ・認定証が授与されます。</div>'+
      '<div style="display:flex;gap:10px"><button class="btn" style="flex:1" onclick="ST.modal=null;render()">キャンセル</button><button class="btn btnpur" style="flex:1" onclick="sendJHT()"><i class="ti ti-send"></i> 送信する</button></div>'+
      '</div></div>';
  }
  return '';
}

function doInvite(){
  const name=document.getElementById('inv-name').value.trim();const email=document.getElementById('inv-email').value.trim();
  if(!name||!email){alert('氏名とメールアドレスを入力してください');return;}
  if(!email.includes('@')){alert('正しいメールアドレスを入力してください');return;}
  const initials=name.replace(/\s/g,'').slice(0,2);
  ST.candidates.push({id:'c'+Date.now(),name,initials,email,addedAt:new Date().toLocaleDateString('ja-JP'),status:'progress',certifiedAt:null,cl:makeCandCl(),p1Done:false,p2Done:false,star1Count:0,testDone:false,testPass:false});
  ST.modal=null;toast(name+'さんへ招待メールを送信しました');render();
}
function sendJHT(){ST.modal=null;render();toast('JHTJapanへスター3認定申請を送信しました');}

go('home');
</script>
</body>
</html>
